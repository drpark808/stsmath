  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saint Theresa School — Math Tutorials</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eef2fa 0%, #fffbe6 100%);
      color: #1B3A8A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      text-align: center;
    }
    .logo-wrap {
      margin-bottom: 24px;
    }
    .logo-wrap img {
      height: 160px;
      width: 160px;
      border-radius: 50%;
      background: #FFD100;
      object-fit: contain;
      box-shadow: 0 4px 16px rgba(27, 58, 138, 0.2);
    }
    h1 {
      color: #1B3A8A;
      font-size: 2.2rem;
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .school-name {
      color: #1B3A8A;
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .subtitle {
      color: #555;
      font-size: 1rem;
      margin-bottom: 40px;
      font-style: italic;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #fff;
      border: 3px solid #1B3A8A;
      border-radius: 12px;
      padding: 28px 20px;
      text-decoration: none;
      color: #1B3A8A;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(27, 58, 138, 0.08);
      display: block;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: #FFD100;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 24px rgba(27, 58, 138, 0.25);
      background: #1B3A8A;
      color: #fff;
    }
    .card:hover::before {
      background: #FFD100;
    }
    .card-grade {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1;
      margin-top: 8px;
    }
    .card-label {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card-theme {
      font-size: 0.85rem;
      opacity: 0.8;
      font-style: italic;
    }
    footer {
      margin-top: 50px;
      font-size: 0.85rem;
      color: #888;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .card-grade { font-size: 2.4rem; }
      .logo-wrap img { height: 120px; width: 120px; }
    }
  </style>
</head>
