    .sidebar-item.active { background: #1B3A8A; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .all-math-btn { background: #FFD100; color: #1a2a4a; border: none; cursor: pointer; font-size: 13px; font-weight: 700; padding: 8px 14px; border-radius: 6px; margin-right: 10px; text-decoration: none; display: inline-block; transition: all 0.18s; }

    .content { flex: 1; overflow-y: auto; padding: 30px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .units-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

    .unit-card-icon { font-size: 32px; }
    .unit-card-meta { flex: 1; }
    .unit-card-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
    .unit-card-cc { font-size: 12px; color: #666; }
    .unit-card-desc { font-size: 13px; color: #555; margin-bottom: 12px; line-height: 1.4; }

    .lesson-content li { margin-bottom: 8px; }

    .btn-secondary { background: #6b7280; }
    .btn-secondary:hover { background: #4b5563; }

    .btn-ixl:hover { background: #2563eb; }
    .btn-yt { display: inline-block; padding: 10px 15px; background: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; margin: 5px 5px 5px 0; font-size: 13px; }
    .btn-yt:hover { background: #dc2626; }

    .resource-card h3 { margin-bottom: 10px; color: #1B3A8A; font-size: 14px; }
    .resource-btns { display: flex; flex-wrap: wrap; }
    .problem { background: white; padding: 15px; margin: 12px 0; border-left: 4px solid #1B3A8A; border-radius: 4px; }
    .problem h4 { margin-bottom: 8px; color: #1B3A8A; }
    .problem input, .problem textarea { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; font-family: 'Courier New', monospace; }
    .answer-key { background: #fef3c7; padding: 10px; margin: 8px 0; border-radius: 4px; font-size: 13px; }
    .quiz-question { background: white; padding: 15px; margin: 15px 0; border-radius: 4px; border-left: 4px solid #1B3A8A; }
    .quiz-question h4 { margin-bottom: 10px; color: #1B3A8A; }
    .quiz-question label { display: block; margin: 8px 0; cursor: pointer; }
    .quiz-question input[type="radio"] { margin-right: 8px; }
    .result-card { background: #fef3c7; padding: 20px; border-radius: 8px; margin: 15px 0; }
    .result-card h3 { color: #059669; margin-bottom: 10px; }
    .nav-buttons { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
    .back-btn { background: #6b7280; }
    .back-btn:hover { background: #4b5563; }

    .handout-card { background: #fff; border-left: 5px solid #B8860B; border-radius: 10px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .handout-card h3 { margin: 0 0 8px; color: #B8860B; font-size: 1.2rem; }
    .handout-science { font-size: 0.9rem; color: #666; margin-bottom: 12px; }
    .handout-mission { background: #f8f9ff; border-radius: 6px; padding: 12px; margin-bottom: 16px; font-style: italic; color: #334; }
    .handout-steps { margin: 0 0 16px; padding-left: 0; list-style: none; counter-reset: step-counter; }
    .handout-steps li { counter-increment: step-counter; padding: 8px 12px 8px 44px; margin-bottom: 6px; background: #f0f4ff; border-radius: 6px; position: relative; font-size: 0.92rem; line-height: 1.5; }
    .handout-steps li::before { content: counter(step-counter); position: absolute; left: 10px; top: 8px; width: 22px; height: 22px; background: #B8860B; color: #fff; border-radius: 50%; font-size: 0.78rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    .handout-deliverable { background: #fffbe6; border: 1px solid #f5d000; border-radius: 6px; padding: 12px; margin-bottom: 16px; }
    .handout-deliverable strong { display: block; margin-bottom: 4px; color: #7a5f00; }
    .handout-reflect { background: #fffbea; border: 1px solid #68d391; border-radius: 6px; padding: 12px; }
    .handout-reflect strong { display: block; margin-bottom: 4px; color: #276749; }
    .handout-reflect ol { margin: 0; padding-left: 20px; }
    .handout-reflect li { margin-bottom: 6px; font-size: 0.9rem; }
    code { background: #e8edf5; padding: 1px 5px; border-radius: 3px; font-family: 'Courier New', monospace; font-size: 0.88em; }

const LESSONS = {
  "numbers-counting": "<h2>Numbers & Counting</h2><p>We use <strong>numbers</strong> to count things. We start at <strong>1</strong>, then 2, 3, 4… all the way up to 100 and beyond.</p><h3>The Hundred Chart</h3><p>A hundred chart is a square with 10 rows and 10 columns. It helps you see how numbers grow.</p><ul><li>Each <strong>row</strong> has 10 numbers (1–10, 11–20, 21–30, and so on).</li><li>Moving <strong>right</strong> adds 1.</li><li>Moving <strong>down</strong> adds 10.</li></ul><h3>Counting Tips</h3><ul><li>Use your fingers when numbers are small.</li><li>Touch each thing you count one time so you don't skip or count twice.</li><li>The last number you say is the total.</li></ul><p><strong>Try it:</strong> Count the windows in your classroom. Did you get the same number twice? Try it again and check.</p>",

  "number-patterns": "<h2>Number Patterns</h2><p>A <strong>pattern</strong> is something that repeats in a special way. In math, patterns help us find the next number in a list.</p><h3>Skip Counting</h3><ul><li><strong>By 2s:</strong> 2, 4, 6, 8, 10, 12, …</li><li><strong>By 5s:</strong> 5, 10, 15, 20, 25, 30, …</li><li><strong>By 10s:</strong> 10, 20, 30, 40, 50, …</li></ul><h3>Find the Missing Number</h3><p>If the pattern is 5, 10, 15, __, 25 — the missing number is <strong>20</strong>. We add 5 each time.</p><h3>Why It Matters</h3><p>Skip counting helps you count fast — by 2s you can count shoes, by 5s you can count fingers, by 10s you can count toes!</p>",

  "comparing-numbers": "<h2>Comparing Numbers</h2><p>When you have two numbers, you can ask: which one is bigger? We compare them using these signs:</p><ul><li><strong>&gt;</strong> means <em>greater than</em> (the bigger number)</li><li><strong>&lt;</strong> means <em>less than</em> (the smaller number)</li><li><strong>=</strong> means <em>equal to</em> (the same)</li></ul><h3>The Alligator Trick</h3><p>The <strong>&gt;</strong> and <strong>&lt;</strong> signs look like an alligator's open mouth. The alligator always eats the <em>bigger</em> number.</p><ul><li>7 &gt; 4 (alligator eats the 7)</li><li>3 &lt; 8 (alligator eats the 8)</li><li>5 = 5 (same, no eating!)</li></ul><h3>Tip</h3><p>For two-digit numbers, compare the <strong>tens</strong> first. 42 vs 27 → 4 tens beats 2 tens, so 42 is bigger.</p>",

  "base-ten-blocks": "<h2>Base Ten Blocks</h2><p><strong>Base-ten blocks</strong> are little blocks that help you see numbers.</p><ul><li>A <strong>unit</strong> is one small cube — it stands for <strong>1</strong>.</li><li>A <strong>rod</strong> is a stick of 10 little cubes — it stands for <strong>10</strong>.</li><li>A <strong>flat</strong> is a square of 100 little cubes — it stands for <strong>100</strong>.</li></ul><h3>Building Numbers</h3><p>To show <strong>34</strong>: take <strong>3 rods</strong> (30) + <strong>4 unit cubes</strong> (4) = 34.</p><p>To show <strong>52</strong>: take <strong>5 rods</strong> (50) + <strong>2 unit cubes</strong> (2) = 52.</p><h3>Tip</h3><p>Always count the rods (tens) <em>first</em>, then the unit cubes (ones).</p>",

  "place-value": "<h2>Place Value</h2><p>Every digit in a number has a <strong>place</strong>. The place tells you how much that digit is worth.</p><h3>Tens and Ones</h3><p>A two-digit number has a <strong>tens</strong> place and a <strong>ones</strong> place.</p><p>In <strong>47</strong>:</p><ul><li>The <strong>4</strong> is in the tens place → it means <strong>4 tens = 40</strong></li><li>The <strong>7</strong> is in the ones place → it means <strong>7 ones = 7</strong></li><li>So 47 = 40 + 7</li></ul><h3>More Examples</h3><ul><li><strong>63</strong> = 6 tens + 3 ones = 60 + 3</li><li><strong>28</strong> = 2 tens + 8 ones = 20 + 8</li><li><strong>90</strong> = 9 tens + 0 ones = 90</li></ul><p><em>Big idea:</em> the place of a digit changes how much it is worth.</p>",

  "addition": "<h2>Addition</h2><p>Addition is <strong>putting numbers together</strong>. The plus sign (+) means \"add.\"</p><h3>Ways to Add</h3><ul><li><strong>Count up:</strong> Start at the bigger number and count up. 6 + 3 → say \"6, then 7, 8, 9\" → <strong>9</strong>.</li><li><strong>Use your fingers:</strong> Hold up 4 on one hand and 3 on the other. Count them all = 7.</li><li><strong>Number line:</strong> Start at 5, hop 2 to the right → land on <strong>7</strong>.</li><li><strong>Make 10:</strong> 8 + 5 = 8 + 2 + 3 = 10 + 3 = 13.</li></ul><h3>Doubles</h3><p>Doubles are easy to memorize: 2+2=4, 3+3=6, 4+4=8, 5+5=10, 6+6=12, 7+7=14, 8+8=16, 9+9=18.</p>",

  "subtraction": "<h2>Subtraction</h2><p>Subtraction is <strong>taking away</strong>. The minus sign (−) means \"take away.\"</p><h3>Ways to Subtract</h3><ul><li><strong>Count back:</strong> 9 − 3 → say \"9, then 8, 7, 6\" → <strong>6</strong>.</li><li><strong>Take away with fingers:</strong> Hold up 7 fingers. Fold 2 down. Count what's left → 5.</li><li><strong>Think addition:</strong> 12 − 5 = ? Ask \"5 plus what equals 12?\" 5 + 7 = 12 → answer is <strong>7</strong>.</li><li><strong>Number line:</strong> Start at 8, hop 3 to the left → land on <strong>5</strong>.</li></ul><h3>Zero Tricks</h3><ul><li>Anything minus 0 stays the same: 6 − 0 = 6.</li><li>Anything minus itself is 0: 7 − 7 = 0.</li></ul>",

  "fractions": "<h2>Fractions</h2><p>A <strong>fraction</strong> is part of a whole. The whole is split into <em>equal</em> pieces.</p><h3>Halves</h3><p>If you split something into <strong>2 equal parts</strong>, each part is one <strong>half</strong>. Two halves make a whole.</p><p><em>Example:</em> Cut a pizza right down the middle. Each piece is half the pizza.</p><h3>Fourths (Quarters)</h3><p>If you split something into <strong>4 equal parts</strong>, each part is one <strong>fourth</strong> (also called a <strong>quarter</strong>). Four fourths make a whole.</p><p><em>Example:</em> Cut a sandwich into 4 same-size pieces. Each is one fourth.</p><h3>The Big Rule</h3><p><strong>Equal parts only!</strong> If the pieces are not the same size, they are not halves or fourths.</p>",

  "measurement": "<h2>Measurement</h2><p><strong>Measurement</strong> tells us how long, tall, or heavy something is.</p><h3>Length</h3><p>To measure how long something is:</p><ol><li>Line up your ruler with one end of the object.</li><li>Make sure the ruler starts at <strong>0</strong>.</li><li>Read the number where the object ends.</li></ol><p>We use <strong>inches</strong> (in) or <strong>centimeters</strong> (cm).</p><h3>Compare Lengths</h3><p>If a pencil is 6 inches long and a crayon is 4 inches long, the pencil is <strong>longer</strong> (or the crayon is <strong>shorter</strong>).</p><h3>Non-Standard Units</h3><p>You can measure with anything that is the same size — paper clips, your hand, or footsteps! Just make sure each one is the same.</p>",

  "counting-money": "<h2>Counting Money</h2><p>The four most common coins are:</p><ul><li><strong>Penny</strong> = 1 cent (1¢) &mdash; brown</li><li><strong>Nickel</strong> = 5 cents (5¢) &mdash; silver, thick</li><li><strong>Dime</strong> = 10 cents (10¢) &mdash; silver, small</li><li><strong>Quarter</strong> = 25 cents (25¢) &mdash; silver, big</li></ul><h3>Adding Coins</h3><p>To find the total, add the values together. Start with the biggest coin first.</p><p><em>Example:</em> 1 quarter + 1 dime + 2 pennies = 25 + 10 + 1 + 1 = <strong>37¢</strong>.</p><h3>Tip</h3><p>Skip-count to add coins quickly:</p><ul><li>Pennies: count by 1s</li><li>Nickels: count by 5s</li><li>Dimes: count by 10s</li><li>Quarters: count by 25s (25, 50, 75, 100)</li></ul>",

  "telling-time": "<h2>Telling Time</h2><p>A clock has two hands:</p><ul><li>The <strong>short hand</strong> shows the <strong>hour</strong>.</li><li>The <strong>long hand</strong> shows the <strong>minutes</strong>.</li></ul><h3>Time to the Hour</h3><p>When the long hand points to <strong>12</strong>, it is <em>on the hour</em>. Read the short hand and say \"o'clock.\"</p><p><em>Example:</em> short hand on 3, long hand on 12 → <strong>3:00</strong> (\"three o'clock\").</p><h3>Time to the Half-Hour</h3><p>When the long hand points to <strong>6</strong>, it is <em>half past</em> the hour. The short hand is between two numbers.</p><p><em>Example:</em> short hand between 4 and 5, long hand on 6 → <strong>4:30</strong> (\"four-thirty\" or \"half past four\").</p><h3>Digital Clocks</h3><p>A digital clock shows the time with numbers like <strong>2:00</strong> or <strong>2:30</strong>. The number before the dots is the hour; the number after is the minutes.</p>",

  "geometry": "<h2>Geometry — Shapes Around Us</h2><p><strong>Geometry</strong> is the math of shapes.</p><h3>2D Shapes (Flat)</h3><ul><li><strong>Circle</strong> — round, no corners</li><li><strong>Triangle</strong> — 3 sides, 3 corners</li><li><strong>Square</strong> — 4 equal sides, 4 corners</li><li><strong>Rectangle</strong> — 4 sides (2 long, 2 short), 4 corners</li><li><strong>Hexagon</strong> — 6 sides, 6 corners</li></ul><h3>3D Shapes (Solid)</h3><ul><li><strong>Sphere</strong> — like a ball (no edges)</li><li><strong>Cube</strong> — like a dice (6 square faces)</li><li><strong>Cylinder</strong> — like a can (2 circle ends)</li><li><strong>Cone</strong> — like an ice cream cone</li><li><strong>Pyramid</strong> — pointy top, triangle sides</li></ul><h3>Vocabulary</h3><ul><li><strong>Side:</strong> the straight line of a flat shape</li><li><strong>Corner (vertex):</strong> where two sides meet</li><li><strong>Face:</strong> the flat side of a solid shape</li></ul>",

  "data-graphing": "<h2>Data & Graphing</h2><p><strong>Data</strong> means information. We can show data in pictures so it's easy to read.</p><h3>Tally Marks</h3><p>Tally marks are little lines that help us count groups of 5:</p><p>| = 1 &nbsp;&nbsp; || = 2 &nbsp;&nbsp; ||| = 3 &nbsp;&nbsp; |||| = 4 &nbsp;&nbsp; <strong>||||̸</strong> = 5 (four lines with a slash)</p><h3>Picture Graphs (Pictographs)</h3><p>A picture graph uses a small drawing for each thing counted. Example: 🐠🐠🐠🐠 means 4 fish.</p><h3>Bar Graphs</h3><p>A bar graph uses bars. Taller bars mean more.</p><h3>Reading Graphs</h3><p>To read a graph, ask:</p><ul><li><strong>How many</strong> of each thing?</li><li><strong>Which has the most?</strong> (tallest / longest bar)</li><li><strong>Which has the least?</strong> (shortest bar)</li></ul>",

  "word-problems": "<h2>Word Problems</h2><p>A <strong>word problem</strong> is a math problem written in words instead of just numbers. You read it, find the math, and solve it.</p><h3>Steps to Solve</h3><ol><li><strong>Read</strong> the whole problem.</li><li><strong>Picture</strong> what is happening (or draw it!).</li><li><strong>Decide</strong>: am I adding (\"in all\", \"together\") or subtracting (\"left over\", \"how many more\")?</li><li><strong>Write</strong> the number sentence.</li><li><strong>Solve</strong> and write a sentence answer.</li></ol><h3>Example 1 — Addition</h3><p><em>Manu saw 5 plumeria flowers in her yard. Then she found 3 more at the beach. How many did she find in all?</em></p><p>5 + 3 = <strong>8</strong> flowers in all.</p><h3>Example 2 — Subtraction</h3><p><em>Kai had 10 shells. He gave 4 to his sister. How many does he have left?</em></p><p>10 − 4 = <strong>6</strong> shells left.</p>"
};

let completedUnits = {};
let currentUnit = null;

function resourceCardHTML(unit) {
  const ixlBtn = unit.ixlUrl ? `<a class="btn-ixl" href="${unit.ixlUrl}" target="_blank">📘 IXL Practice</a>` : '';
  const ytBtn = `<a class="btn-yt" href="https://www.youtube.com/results?search_query=${encodeURIComponent(unit.ytSearch)}" target="_blank">▶️ YouTube</a>`;
  return `<div class="resource-card"><h3>📚 Practice & Watch</h3><div class="resource-btns">${ixlBtn}${ytBtn}</div></div>`;
}

function renderHome() {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = '';
  UNITS.forEach(unit => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.onclick = () => showLesson(unit.id);
    card.innerHTML = `
      <div class="unit-card-header">
        <div class="unit-card-icon">${unit.icon}</div>
        <div class="unit-card-meta">
          <div class="unit-card-title">${unit.title}${completedUnits[unit.id]?' ✅':''}</div>
          <div class="unit-card-cc">${unit.cc}</div>
        </div>
      </div>
      <div class="unit-card-desc">${unit.desc}</div>
      <div class="unit-card-pills">
        <div class="pill">📖 Lesson</div>
        ${unit.ixlUrl?'<div class="pill">📘 IXL</div>':''}
        <div class="pill">🌺 Real-World</div>
        <div class="pill">📋 Worksheet</div>
        <div class="pill">▶️ YouTube</div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar-content');
  sidebar.innerHTML = '';
  UNITS.forEach((unit, idx) => {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (currentUnit === unit.id ? ' active' : '');
    item.textContent = `${idx + 1}. ${unit.title}${completedUnits[unit.id]?' ✅':''}`;
    item.onclick = () => showLesson(unit.id);
    sidebar.appendChild(item);
  });
}

function setTopbar() {
  document.getElementById('topbar-title').textContent = currentUnit ? UNITS.find(u => u.id === currentUnit).title : 'Discovering the World with Math';
}

function updateProgress() {
  const n = Object.keys(completedUnits).length;
  document.getElementById('progress-text').textContent = `${n}/${UNITS.length}`;
}

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home-screen').classList.add('active');
  currentUnit = null;
  renderHome();
  renderSidebar();
  setTopbar();
  updateProgress();
}

function showLesson(unitId) {
  currentUnit = unitId;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lesson-screen').classList.add('active');
  const unit = UNITS.find(u => u.id === unitId);
  document.getElementById('lesson-content').innerHTML = LESSONS[unitId] + resourceCardHTML(unit);
  renderSidebar();
  setTopbar();
}

function showWorksheet() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('worksheet-screen').classList.add('active');
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><textarea id="ans-${idx}" placeholder="Your answer..."></textarea></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function checkWorksheet() {
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    const userAns = document.getElementById(`ans-${idx}`).value;
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><div class="answer-key"><strong>Answer:</strong> ${p.answer}</div><p><strong>Your answer:</strong> ${userAns || '(no answer)'}</p></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function showHandout() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('handout-screen').classList.add('active');
  const h = HANDOUTS[currentUnit];
  let html = `<div class="handout-card">
    <h3>${h.science}</h3>
    <div class="handout-science">A hands-on activity to use today's math at home or in your neighborhood.</div>
    <div class="handout-mission">🎯 <strong>Mission:</strong> ${h.mission}</div>
    <strong style="color:#1B3A8A;">Steps:</strong>
    <ol class="handout-steps">${h.steps.map(s => `<li>${s}</li>`).join('')}</ol>
    <div class="handout-deliverable"><strong>📦 What to bring back to class:</strong>${h.deliverable}</div>
    <div class="handout-reflect"><strong>🤔 Reflect:</strong><ol>${h.reflect.map(r => `<li>${r}</li>`).join('')}</ol></div>
  </div>`;
  document.getElementById('handout-content').innerHTML = html;
}

function showQuiz() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz-screen').classList.add('active');
  const quiz = QUIZZES[currentUnit];
  let html = `
    <div style="background:#f0f4ff;padding:14px;border-radius:8px;margin-bottom:15px;border-left:4px solid #1B3A8A;">
      <label style="display:block;font-weight:600;color:#1B3A8A;margin-bottom:6px;">Student Name:</label>
      <input type="text" id="student-name" placeholder="Type your full name"
        style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;" />
    </div>
  `;
  quiz.forEach((q, idx) => {
    html += `<div class="quiz-question"><h4>Question ${idx + 1}</h4><p>${q.q}</p>`;
    q.opts.forEach((opt, optIdx) => {
      html += `<label><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</label>`;
    });
    html += `</div>`;
  });
  document.getElementById('quiz-content').innerHTML = html;
}

// Quiz results stored at the latest submission so the email button can use them.
let lastQuizResults = null;

function submitQuiz() {
  const quiz = QUIZZES[currentUnit];
  const studentName = (document.getElementById('student-name')?.value || '').trim();
  let score = 0;
  const breakdown = [];
  quiz.forEach((q, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const selectedIdx = selected ? parseInt(selected.value) : -1;
    const isCorrect = selectedIdx === q.ans;
    if (isCorrect) score++;
    breakdown.push({
      n: idx + 1,
      question: q.q,
      studentAnswer: selectedIdx >= 0 ? q.opts[selectedIdx] : '(no answer)',
      correctAnswer: q.opts[q.ans],
      correct: isCorrect
    });
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('certificate-screen').classList.add('active');
  const pct = Math.round((score / quiz.length) * 100);

  // Find unit title for display
  const unitObj = UNITS.find(u => u.id === currentUnit);
  const unitTitle = unitObj ? unitObj.title : currentUnit;

  lastQuizResults = { studentName, unitTitle, score, total: quiz.length, pct, breakdown };

  const nameLine = studentName
    ? `<p><strong>Student:</strong> ${studentName}</p>`
    : `<p style="color:#b91c1c;"><em>Tip: type your name on the quiz screen before submitting so your teacher knows who you are.</em></p>`;

  document.getElementById('cert-content').innerHTML = `
    <div class="result-card">
      ${nameLine}
      <p><strong>Unit:</strong> ${unitTitle}</p>
      <h3>Score: ${score} out of ${quiz.length} (${pct}%)</h3>
      <p>${pct === 100 ? "Perfect! 🌟" : pct >= 67 ? "Nice work! Keep practicing." : "Good try! Review the lesson and try again."}</p>
      <div style="margin-top:18px;">
        <button class="btn" onclick="emailResults()" style="background:#1B3A8A;color:white;padding:10px 18px;font-size:14px;border:none;border-radius:6px;cursor:pointer;">
          📧 Send Results to Mr. Macadangdang
        </button>
      </div>
      <p style="margin-top:10px;font-size:12px;color:#666;">
        Tapping the button opens your email app with the score and answers filled in. Just press Send.
      </p>
    </div>
  `;
  if (pct >= 67) completedUnits[currentUnit] = true;
  updateProgress();
}

function emailResults() {
  if (!lastQuizResults) return;
  const r = lastQuizResults;
  const lines = [];
  lines.push(`Aloha Mr. Macadangdang,`);
  lines.push(``);
  lines.push(`A 1st-grade math quiz was just submitted.`);
  lines.push(``);
  lines.push(`Student: ${r.studentName || '(name not provided)'}`);
  lines.push(`Unit: ${r.unitTitle}`);
  lines.push(`Score: ${r.score} out of ${r.total} (${r.pct}%)`);
  lines.push(``);
  lines.push(`--- Detailed Answers ---`);
  r.breakdown.forEach(b => {
    lines.push(``);
    lines.push(`Q${b.n}. ${b.question}`);
    lines.push(`   Student's answer: ${b.studentAnswer}`);
    lines.push(`   Correct answer:   ${b.correctAnswer}`);
    lines.push(`   ${b.correct ? '✓ Correct' : '✗ Incorrect'}`);
  });
  lines.push(``);
  lines.push(`Mahalo,`);
  lines.push(`Saint Theresa School — Grade 1 Math`);

  const subject = `Grade 1 Math Quiz Result — ${r.studentName || 'Student'} — ${r.unitTitle} — ${r.pct}%`;
  const body = lines.join('\n');
  const to = 'mmacadangdang@rcchawaii.org';

  // Open Gmail's compose window directly (uses whichever Gmail account is logged in,
  // typically the student's @stshi.org account). Opens in a new tab so they don't
  // lose their place on the math page.
  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&tf=1`
    + `&to=${encodeURIComponent(to)}`
    + `&su=${encodeURIComponent(subject)}`
    + `&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl, '_blank');
}

// Initial render
showHome();
