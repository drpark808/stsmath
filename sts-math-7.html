    .home-btn:hover { background: rgba(0,0,0,0.35); }

    .unit-card-icon { font-size: 32px; }
    .unit-card-meta { flex: 1; }
    .unit-card-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
    .unit-card-cc { font-size: 12px; color: #666; }
    .unit-card-desc { font-size: 13px; color: #555; margin-bottom: 12px; line-height: 1.4; }
    .unit-card-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { background: #f0f0f0; padding: 4px 10px; border-radius: 16px; font-size: 11px; }
    .lesson-content h2 { margin: 20px 0 10px 0; color: #a78bfa; }
    .lesson-content p { margin-bottom: 12px; line-height: 1.6; }

    .lesson-content li { margin-bottom: 8px; }

    .btn-secondary { background: #6b7280; }
    .btn-secondary:hover { background: #4b5563; }

    .btn-ka:hover { background: #16a34a; }
    .btn-ixl { display: inline-block; padding: 10px 15px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; margin: 5px 5px 5px 0; font-size: 13px; }
    .btn-ixl:hover { background: #2563eb; }
    .btn-yt { display: inline-block; padding: 10px 15px; background: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; margin: 5px 5px 5px 0; font-size: 13px; }

    .btn-phet { display: inline-block; padding: 10px 15px; background: #7c3aed; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; margin: 5px 5px 5px 0; font-size: 13px; }

    .nav-buttons { display: flex; gap: 10px; margin: 20px 0; }
    .back-btn { background: #6b7280; }
    .back-btn:hover { background: #4b5563; }

        height: 22px;

        color: #fff;

        font-weight: bold;
        display: flex;
        align-items: center;

        padding: 12px;

        display: block;
        margin-bottom: 4px;
        color: #7a5f00;
      }
      .handout-reflect {
        background: #fffbea;
        border: 1px solid #68d391;
        border-radius: 6px;
        padding: 12px;
      }
      .handout-reflect strong {
        display: block;
        margin-bottom: 4px;
        color: #276749;
      }
      .handout-reflect ol {
        margin: 0;
        padding-left: 20px;
      }

        margin-bottom: 6px;

        padding: 1px 5px;

const LESSONS = {
  'proportional': `<h2>Proportional Relationships</h2><p>A <strong>proportional relationship</strong> exists when two quantities have a constant ratio.</p><h3>Identifying Proportional Relationships</h3><ul><li>Ratio stays the same: 2:3, 4:6, 6:9 are all equivalent</li><li>Graph passes through origin (0,0)</li><li>Equation form: y = kx where k is constant</li></ul><h3>The Constant of Proportionality</h3><p>k represents the constant ratio. If y = 3x, then k = 3. For every 1 unit increase in x, y increases by 3.</p><h3>Real-World Examples</h3><ul><li>Distance = 50 × time (50 mph)</li><li>Cost = 2.50 × quantity ($2.50 per item)</li><li>Conversions: kilometers = 1.609 × miles</li></ul><h3>Tables and Graphs</h3><p>Look for consistent ratios in tables. Linear graphs through origin show proportional relationships.</p>`,
  'ratios-rates': `<h2>Ratios & Unit Rates</h2><p>A <strong>unit rate</strong> is a rate with denominator 1. It simplifies comparisons.</p><h3>Finding Unit Rates from Fractions</h3><p>Rate with fractions: 3/4 mile in 1/2 hour</p><p>Unit rate = (3/4) ÷ (1/2) = (3/4) × (2/1) = 3/2 = 1.5 miles per hour</p><h3>Comparing Unit Rates</h3><p>Option A: 300 miles per 5 hours = 60 mph</p><p>Option B: 400 miles per 8 hours = 50 mph</p><p>Option A is faster!</p><h3>Applications</h3><ul><li>Speed comparisons</li><li>Price per unit</li><li>Conversions</li><li>Density and concentration</li></ul><h3>Solving with Unit Rates</h3><p>If 1 item costs $3.50, find cost of 8: 8 × 3.50 = $28</p>`,
  'scientific-notation': `<h2>Scientific Notation — Extended</h2><p>In 6th grade you used scientific notation for very <strong>large</strong> numbers (positive exponents). In 7th grade we extend to very <strong>small</strong> numbers using <strong>negative exponents</strong>, and learn to multiply and divide in scientific notation.</p><h3>Negative Exponents — Very Small Numbers</h3><p>A negative exponent means you move the decimal <em>left</em> instead of right:</p><ul><li>10⁻¹ = 0.1 (one-tenth)</li><li>10⁻³ = 0.001 (one-thousandth)</li><li>10⁻⁶ = 0.000001 (one-millionth)</li></ul><p><strong>Rule:</strong> 10⁻ⁿ = 1 ÷ 10ⁿ</p><h3>Converting Small Numbers to Scientific Notation</h3><ol><li>Move the decimal <em>right</em> until one non-zero digit is in front</li><li>Count steps moved — that is your <em>negative</em> exponent</li></ol><ul><li>0.0045 → move decimal 3 right → <strong>4.5 × 10⁻³</strong></li><li>0.000000082 → move 8 right → <strong>8.2 × 10⁻⁸</strong></li></ul><h3>Life Science Examples</h3><table style="border-collapse:collapse;width:100%;font-size:0.93em;"><tr style="background:#1F3864;color:#fff;"><th style="padding:6px 10px;">Object</th><th style="padding:6px 10px;">Size (m)</th><th style="padding:6px 10px;">Scientific Notation</th></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">Red blood cell</td><td style="padding:6px 10px;">0.000008 m</td><td style="padding:6px 10px;">8 × 10⁻⁶ m</td></tr><tr><td style="padding:6px 10px;">Bacterium</td><td style="padding:6px 10px;">0.000002 m</td><td style="padding:6px 10px;">2 × 10⁻⁶ m</td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">Virus</td><td style="padding:6px 10px;">0.0000001 m</td><td style="padding:6px 10px;">1 × 10⁻⁷ m</td></tr><tr><td style="padding:6px 10px;">DNA width</td><td style="padding:6px 10px;">0.0000000025 m</td><td style="padding:6px 10px;">2.5 × 10⁻⁹ m</td></tr></table><h3>Multiplying in Scientific Notation</h3><p>Multiply the decimal parts, then add the exponents:</p><p>(a × 10ᵐ) × (b × 10ⁿ) = (a × b) × 10<sup>m+n</sup></p><ul><li>(3 × 10⁴) × (2 × 10³) = 6 × 10⁷</li><li>(4 × 10⁵) × (2 × 10⁻³) = 8 × 10²</li></ul><p>If the result's decimal part is ≥ 10, adjust: 12 × 10³ → 1.2 × 10⁴</p><h3>Dividing in Scientific Notation</h3><p>Divide the decimal parts, then subtract the exponents:</p><ul><li>(8 × 10⁶) ÷ (2 × 10³) = 4 × 10³</li><li>(6 × 10²) ÷ (3 × 10⁵) = 2 × 10⁻³</li></ul><h3>Connection to Unit Conversions</h3><p>The milli- prefix is 10⁻³, centi- is 10⁻², deci- is 10⁻¹ — these are negative exponents from the KHDUdcm chart. A red blood cell at 8 × 10⁻⁶ m is 8 micrometers — two steps below milli on an extended chart. The systems connect perfectly.`,
  'unit-conversions': `<h2>Unit Conversions — KHDUdcm</h2><p>You learned the KHDUdcm staircase in 6th grade for basic conversions. In 7th grade, we extend to <strong>multi-step conversions</strong> and <strong>rate conversions</strong> — skills used constantly in life science and medicine.</p><table style="border-collapse:collapse;width:100%;font-size:0.93em;margin:10px 0;"><tr style="background:#1F3864;color:#fff;"><th style="padding:7px 10px;">K</th><th style="padding:7px 10px;">H</th><th style="padding:7px 10px;">D</th><th style="padding:7px 10px;">U</th><th style="padding:7px 10px;">d</th><th style="padding:7px 10px;">c</th><th style="padding:7px 10px;">m</th></tr><tr style="text-align:center;background:#f2f2f2;"><td style="padding:6px 10px;">Kilo</td><td style="padding:6px 10px;">Hecto</td><td style="padding:6px 10px;">Deca</td><td style="padding:6px 10px;font-weight:bold;">Unit</td><td style="padding:6px 10px;">deci</td><td style="padding:6px 10px;">centi</td><td style="padding:6px 10px;">milli</td></tr><tr style="text-align:center;"><td style="padding:6px 10px;">10³</td><td style="padding:6px 10px;">10²</td><td style="padding:6px 10px;">10¹</td><td style="padding:6px 10px;font-weight:bold;">10⁰</td><td style="padding:6px 10px;">10⁻¹</td><td style="padding:6px 10px;">10⁻²</td><td style="padding:6px 10px;">10⁻³</td></tr></table><p><strong>Memory:</strong> <em>"<strong>K</strong>ing <strong>H</strong>enry <strong>D</strong>oesn't <strong>U</strong>sually <strong>d</strong>rink <strong>c</strong>hocolate <strong>m</strong>ilk"</em></p><h3>Multi-Step Conversions</h3><p>To convert from km to cm, count 5 steps right → multiply by 10⁵ = 100,000.</p><ul><li><strong>0.8 km → cm:</strong> 0.8 × 100,000 = <strong>80,000 cm</strong></li><li><strong>1.2 kg → mg:</strong> 6 steps right → 1.2 × 1,000,000 = <strong>1,200,000 mg</strong></li><li><strong>5000 mm → km:</strong> 6 steps left → 5000 ÷ 1,000,000 = <strong>0.005 km</strong></li></ul><h3>Rate Conversions — km/h to m/s</h3><p>Speed in km/h needs to become m/s for science calculations. Use two unit rate conversions at once:</p><ol><li>1 km = 1000 m → multiply by 1000</li><li>1 hour = 3600 seconds → divide by 3600</li></ol><p style="text-align:center;padding:8px;background:#f0f4ff;border-radius:6px;"><strong>m/s = km/h × 1000 ÷ 3600 = km/h ÷ 3.6</strong></p><ul><li>72 km/h → 72 ÷ 3.6 = <strong>20 m/s</strong></li><li>108 km/h → 108 ÷ 3.6 = <strong>30 m/s</strong></li><li>Reverse: 15 m/s × 3.6 = <strong>54 km/h</strong></li></ul><h3>Connection to Unit Rates (7.RP.1)</h3><p>Converting 72 km/h to m/s is a <em>compound unit rate</em> — two conversions happening together. You are finding how many meters per second using the same proportional reasoning you apply to any unit rate problem.</p><h3>Life Science Applications</h3><ul><li><strong>Medicine doses:</strong> Pediatric dosing is given in mg per kg of body weight. A 30 kg child needing 5 mg/kg → 30 × 5 = 150 mg dose. Convert to g → 0.15 g.</li><li><strong>Cell sizes:</strong> A red blood cell is about 8 µm (micrometers). 1 mm = 1000 µm, so 8 µm = 0.008 mm.</li><li><strong>Organism lengths:</strong> A blue whale (30 m) vs. an ant (3 mm) — convert both to cm to compare directly.</li></ul><h3>The Factor-Label Method (Dimensional Analysis)</h3><p>The KHDUdcm staircase is fast for metric conversions, but science classes use a more powerful tool that also works for <em>any</em> conversion — metric to imperial, rates to rates, even chained conversions in chemistry. It is called the <strong>factor-label method</strong> (also called <em>dimensional analysis</em>).</p><h4>The big idea</h4><p>Multiply by fractions equal to <strong>1</strong> — built from a unit equality — so units <strong>cancel</strong> on the way to the answer. Anything you multiply by 1 stays the same value, so the math is always honest.</p><p style="text-align:center;padding:8px;background:#f0f4ff;border-radius:6px;"><strong>1 km = 1000 m</strong> &nbsp; → &nbsp; <strong>1 = 1000 m / 1 km</strong> &nbsp; or &nbsp; <strong>1 = 1 km / 1000 m</strong></p><h4>Step-by-step recipe</h4><ol><li>Write the starting value with its unit.</li><li>Multiply by a "1" fraction whose <em>top</em> has the unit you want, <em>bottom</em> has the unit you want to get rid of.</li><li>Cancel the matching units (cross them out diagonally).</li><li>Multiply the numbers; carry the surviving unit.</li></ol><h4>Worked example — single step</h4><p>Convert <strong>2.5 km</strong> to meters:</p><p style="font-family:monospace;background:#f9fafb;padding:10px;border-left:3px solid #2563eb;">2.5 km × (1000 m / 1 km) = 2500 m</p><p>"km" cancels (one on top, one on bottom). The "m" survives. Numbers: 2.5 × 1000 = 2500.</p><h4>Worked example — chained (rate)</h4><p>Convert <strong>72 km/h</strong> to m/s. Use TWO unit equalities at once:</p><p style="font-family:monospace;background:#f9fafb;padding:10px;border-left:3px solid #2563eb;">72 km/h × (1000 m / 1 km) × (1 h / 3600 s) = 72 × 1000 / 3600 m/s = 20 m/s</p><p>"km" cancels and "h" cancels — leaving m/s. This is exactly the same answer as ÷ 3.6, but the work shows <em>why</em>.</p><h4>Worked example — three-step (medicine)</h4><p>A child weighs <strong>30 kg</strong> and the prescription is <strong>5 mg per kg</strong>. How many <strong>grams</strong> total?</p><p style="font-family:monospace;background:#f9fafb;padding:10px;border-left:3px solid #2563eb;">30 kg × (5 mg / 1 kg) × (1 g / 1000 mg) = 150/1000 g = 0.15 g</p><p>"kg" cancels with "kg", "mg" cancels with "mg". "g" survives.</p><h4>Why this is useful in science</h4><ul><li>It works for <strong>any</strong> conversion — not just powers of ten.</li><li>It catches errors: if your units do not cancel, you set up the fraction upside-down.</li><li>It is the same method used in chemistry (mole conversions), physics (unit checks), and medicine (dose calculations).</li><li>It pairs with KHDUdcm: use the staircase for quick metric jumps, factor-label for everything else.</li></ul>`,
  'percents': `<h2>Percents & Percent Change</h2><p><strong>Percent change</strong> measures how much something increased or decreased as a percentage.</p><h3>Formula</h3><p>Percent Change = (Change ÷ Original) × 100%</p><h3>Percent Increase</h3><p>Original price: $50, New price: $65</p><p>Change = 65 − 50 = 15</p><p>Percent increase = (15 ÷ 50) × 100% = 30%</p><h3>Percent Decrease</h3><p>Original: 80, New: 60</p><p>Change = 80 − 60 = 20</p><p>Percent decrease = (20 ÷ 80) × 100% = 25%</p><h3>Real-World Applications</h3><ul><li>Sales and discounts</li><li>Population growth</li><li>Grade improvements</li><li>Investment returns</li></ul><h3>Finding Original Amount</h3><p>If 30% of x = 15, then x = 15 ÷ 0.30 = 50</p>`,
  'percent-error': `<h2>Percent Error &mdash; The Lab Math Every Scientist Uses</h2><p>You learned <strong>percent change</strong> earlier this year: how much something grew or shrank as a percentage of its original value. <strong>Percent error</strong> uses the same math, but with a different question: <em>how close did I get to the right answer?</em> Every science lab in 7th grade and beyond reports results with percent error so other scientists can judge how trustworthy the data are.</p><h3>The Formula</h3><p style="text-align:center;padding:10px;background:#f0f4ff;border-radius:8px;font-size:1.05em;"><strong>Percent Error = |measured &minus; actual| &divide; actual &times; 100%</strong></p><p>Compare to last unit&apos;s percent change formula: |new &minus; old| &divide; old &times; 100%. Same shape. The difference is what you call the numbers and why you compute it.</p><table style="border-collapse:collapse;width:100%;font-size:0.95em;margin:8px 0;"><tr style="background:#1F3864;color:#fff;"><th style="padding:7px 10px;">Term</th><th style="padding:7px 10px;">Percent Change</th><th style="padding:7px 10px;">Percent Error</th></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">Numerator</td><td style="padding:6px 10px;">|new &minus; old|</td><td style="padding:6px 10px;">|measured &minus; actual|</td></tr><tr><td style="padding:6px 10px;">Denominator</td><td style="padding:6px 10px;">old (starting value)</td><td style="padding:6px 10px;">actual (true value)</td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">Used for</td><td style="padding:6px 10px;">Tracking growth or decline</td><td style="padding:6px 10px;">Evaluating accuracy of a measurement</td></tr></table><h3>Worked Example 1 &mdash; Density of Water</h3><p>The accepted density of water is <strong>1.00 g/mL</strong>. In lab, you measure a sample as <strong>0.95 g/mL</strong>. Percent error?</p><p style="font-family:monospace;background:#f9fafb;padding:10px;border-left:3px solid #2563eb;">|0.95 &minus; 1.00| &divide; 1.00 &times; 100%<br>= 0.05 &divide; 1.00 &times; 100% = <strong>5.0%</strong></p><h3>Worked Example 2 &mdash; Speed of a Toy Car</h3><p>A toy car is rated to travel at 2.0 m/s. You time it and calculate 1.7 m/s.</p><p style="font-family:monospace;background:#f9fafb;padding:10px;border-left:3px solid #2563eb;">|1.7 &minus; 2.0| &divide; 2.0 &times; 100% = 0.3 &divide; 2.0 &times; 100% = <strong>15%</strong></p><p>15% is high &mdash; check timing technique or whether the car is tired.</p><h3>Worked Example 3 &mdash; Acceleration Due to Gravity</h3><p>The accepted value for g is 9.81 m/s&sup2;. A class pendulum experiment yields g = 9.5 m/s&sup2;.</p><p style="font-family:monospace;background:#f9fafb;padding:10px;border-left:3px solid #2563eb;">|9.5 &minus; 9.81| &divide; 9.81 &times; 100% = 0.31 &divide; 9.81 &times; 100% &asymp; <strong>3.16%</strong></p><h3>Worked Example 4 &mdash; A Pediatric Drug Dose</h3><p>A doctor orders 250 mg of a medicine for a child. The pharmacy actually delivers 235 mg.</p><p style="font-family:monospace;background:#f9fafb;padding:10px;border-left:3px solid #2563eb;">|235 &minus; 250| &divide; 250 &times; 100% = 15 &divide; 250 &times; 100% = <strong>6%</strong></p><p>For most medicines that is acceptable. For drugs with a narrow therapeutic window, even 6% can matter &mdash; that is why pharmacists double-check.</p><h3>Accuracy vs. Precision</h3><p>These two words sound similar but mean different things in science:</p><ul><li><strong>Accuracy</strong> = how close to the actual value (low percent error = high accuracy)</li><li><strong>Precision</strong> = how close repeated measurements are to <em>each other</em> (consistency)</li></ul><p>You can be precise but not accurate (the same wrong answer every time, like a clock that&apos;s 10 minutes fast). You can be accurate but not precise (close on average, but each measurement varies). The goal is both.</p><h3>What Counts as Acceptable Error?</h3><table style="border-collapse:collapse;width:100%;font-size:0.95em;margin:10px 0;"><tr style="background:#1F3864;color:#fff;"><th style="padding:7px 10px;">Field</th><th style="padding:7px 10px;">Typical Acceptable %Error</th></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">Middle-school science labs</td><td style="padding:6px 10px;">Under 10%</td></tr><tr><td style="padding:6px 10px;">High-school chemistry</td><td style="padding:6px 10px;">Under 5%</td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">Pharmaceutical manufacturing</td><td style="padding:6px 10px;">Under 1%</td></tr><tr><td style="padding:6px 10px;">NIST physical-constant calibration</td><td style="padding:6px 10px;">Under 0.0001%</td></tr></table><h3>Sources of Error in a Lab</h3><ul><li><strong>Tool resolution:</strong> a ruler with 1 mm marks cannot measure smaller than that</li><li><strong>Reaction time:</strong> stopwatch press timing limits</li><li><strong>Reading the meniscus:</strong> liquids curve in narrow tubes</li><li><strong>Temperature drift:</strong> hot fluids change density</li><li><strong>Calibration:</strong> a scale that wasn&apos;t zeroed</li></ul><p>Reporting percent error and identifying its likely sources is what separates a science <em>fair</em> project from a science <em>experiment</em>.</p>`,
  'add-sub-rational': `<h2>Adding & Subtracting Rational Numbers</h2><p><strong>Rational numbers</strong> include fractions, decimals, and integers (both positive and negative).</p><h3>Same Signs</h3><p>Add absolute values, keep the sign:</p><ul><li>3/4 + 1/4 = 4/4 = 1</li><li>−2.5 + (−1.5) = −4</li></ul><h3>Different Signs</h3><p>Subtract absolute values, keep sign of larger:</p><ul><li>5 + (−3) = 2 (5 is larger)</li><li>−7 + 2 = −5 (7 is larger)</li></ul><h3>With Fractions</h3><p>Find common denominator:</p><p>1/2 + 3/4 = 2/4 + 3/4 = 5/4</p><h3>With Decimals</h3><p>Align decimal points:</p><p>2.75 + (−1.25) = 1.50</p><h3>Real-World Contexts</h3><p>Elevation changes, temperature swings, account balances.</p>`,
  'mult-div-rational': `<h2>Multiplying & Dividing Rational Numbers</h2><h3>Sign Rules</h3><ul><li>Positive × Positive = Positive</li><li>Negative × Negative = Positive</li><li>Positive × Negative = Negative</li><li>Negative ÷ Negative = Positive</li><li>Positive ÷ Negative = Negative</li></ul><h3>Multiplying Fractions</h3><p>(3/4) × (2/5) = 6/20 = 3/10</p><p>Multiply numerators, multiply denominators, simplify.</p><h3>Dividing Fractions</h3><p>(3/4) ÷ (1/2) = (3/4) × (2/1) = 6/4 = 3/2</p><h3>Multiplying Decimals</h3><p>2.5 × (−3.2) = −8.0</p><p>Count decimal places, place decimal in answer.</p><h3>Dividing Decimals</h3><p>−10.5 ÷ 3 = −3.5</p>`,
  'alg-expressions': `<h2>Algebraic Expressions</h2><p>Work with expressions involving multiple operations and variables.</p><h3>Expanding Expressions</h3><p>Distributive property: 3(2x + 4) = 6x + 12</p><h3>Factoring Expressions</h3><p>Find GCF: 6x + 9 = 3(2x + 3)</p><h3>Combining Like Terms</h3><p>4x + 2y − x + 5y = 3x + 7y</p><h3>Simplifying</h3><p>2(3x + 1) − (x − 2) = 6x + 2 − x + 2 = 5x + 4</p><h3>Multi-Step Simplification</h3><p>Follow order of operations, combine like terms, distribute carefully.</p>`,
  'equations': `<h2>Multi-Step Equations</h2><p>Equations with variables on both sides require careful isolation.</p><h3>Two-Step Equations</h3><p>3x + 5 = 20</p><ol><li>Subtract 5: 3x = 15</li><li>Divide by 3: x = 5</li></ol><h3>Variables on Both Sides</h3><p>2x + 3 = x + 7</p><ol><li>Subtract x: x + 3 = 7</li><li>Subtract 3: x = 4</li></ol><h3>Fractions and Decimals</h3><p>x/3 + 2 = 5</p><ol><li>Subtract 2: x/3 = 3</li><li>Multiply by 3: x = 9</li></ol><h3>Real-World Equations</h3><p>Cost problem: 2x + 10 = 30 solves to x = 10</p>`,
  'inequalities': `<h2>Solving & Graphing Inequalities</h2><p>Inequalities are solved like equations, but remember: flip sign when multiplying/dividing by negative!</p><h3>Two-Step Inequalities</h3><p>2x + 3 < 9</p><ol><li>Subtract 3: 2x < 6</li><li>Divide by 2: x < 3</li></ol><h3>With Negatives</h3><p>−2x > 8</p><ol><li>Divide by −2: x < −4 (flip sign!)</li></ol><h3>Graphing Solutions</h3><ul><li>Open circle for < or ></li><li>Closed circle for ≤ or ≥</li><li>Shade toward solution</li></ul><h3>Real-World Contexts</h3><p>Budget limits, age requirements, safety ranges.</p>`,
  'rearranging-formulas': `<h2>Rearranging Formulas &mdash; Solving for a Different Variable</h2><p>Science is full of three-quantity formulas: <strong>D = m / V</strong>, <strong>v = d / t</strong>, <strong>F = m &times; a</strong>, <strong>P = W / t</strong>, <strong>Dose = mg/kg &times; kg</strong>. Most of the time you do not need the formula in its <em>given</em> form &mdash; you need to solve for one of the <em>other</em> two variables. That skill is called <strong>rearranging</strong> (or <em>transposing</em>) the formula.</p><h3>The Big Idea &mdash; Inverse Operations</h3><p>Whatever is happening to the variable you want, undo it on BOTH sides. Multiplication undoes division. Division undoes multiplication.</p><h3>Master Example: D = m / V</strong></h3><p>You know D and V, find m. The variable m is on the top of a fraction, divided by V. Multiply both sides by V to undo the division.</p><p style="font-family:monospace;background:#f9fafb;padding:10px;border-left:3px solid #2563eb;">D = m / V<br>D &times; V = m / V &times; V<br>D &times; V = m <br><strong>m = D &times; V</strong></p><p>Now solve for V (you know D and m). Start from the original. Multiply both sides by V to clear the fraction, then divide by D.</p><p style="font-family:monospace;background:#f9fafb;padding:10px;border-left:3px solid #2563eb;">D = m / V<br>D &times; V = m<br>V = m / D</p><h3>The Formula Triangle (Memory Aid)</h3><p>For any formula of the shape <strong>top = middle &times; bottom</strong>, draw a triangle with the top variable on top and the other two on the bottom. <em>Cover</em> what you want to find &mdash; the rest tells you what to do.</p><table style="margin:0 auto;border-collapse:collapse;"><tr><td style="padding:8px 14px;text-align:center;"><svg width="180" height="160" viewBox="0 0 180 160" xmlns="http://www.w3.org/2000/svg"><polygon points="90,15 170,140 10,140" fill="#fef3c7" stroke="#1F3864" stroke-width="2"/><line x1="30" y1="85" x2="150" y2="85" stroke="#1F3864" stroke-width="2"/><line x1="90" y1="85" x2="90" y2="140" stroke="#1F3864" stroke-width="2"/><text x="90" y="60" font-size="24" font-weight="bold" text-anchor="middle" fill="#1F3864">m</text><text x="55" y="125" font-size="22" font-weight="bold" text-anchor="middle" fill="#1F3864">D</text><text x="125" y="125" font-size="22" font-weight="bold" text-anchor="middle" fill="#1F3864">V</text></svg><div style="font-size:0.92em;">m = D &times; V<br>D = m / V<br>V = m / D</div></td><td style="padding:8px 14px;text-align:center;"><svg width="180" height="160" viewBox="0 0 180 160" xmlns="http://www.w3.org/2000/svg"><polygon points="90,15 170,140 10,140" fill="#dcfce7" stroke="#1F3864" stroke-width="2"/><line x1="30" y1="85" x2="150" y2="85" stroke="#1F3864" stroke-width="2"/><line x1="90" y1="85" x2="90" y2="140" stroke="#1F3864" stroke-width="2"/><text x="90" y="60" font-size="24" font-weight="bold" text-anchor="middle" fill="#1F3864">d</text><text x="55" y="125" font-size="22" font-weight="bold" text-anchor="middle" fill="#1F3864">v</text><text x="125" y="125" font-size="22" font-weight="bold" text-anchor="middle" fill="#1F3864">t</text></svg><div style="font-size:0.92em;">d = v &times; t<br>v = d / t<br>t = d / v</div></td></tr></table><p><em>Cover m</em> and you see D over V → D &times; V (side-by-side means multiply). <em>Cover D</em> and you see m over V → m / V. The triangle is just a picture of the algebra.</p><h3>Worked Examples</h3><p><strong>Density.</strong> A sample has D = 5 g/cm³ and V = 20 cm³. Find m.</p><p style="font-family:monospace;background:#f9fafb;padding:8px;border-left:3px solid #2563eb;">m = D &times; V = 5 &times; 20 = 100 g</p><p><strong>Speed.</strong> A car travels d = 240 km in t = 4 h. Find v.</p><p style="font-family:monospace;background:#f9fafb;padding:8px;border-left:3px solid #2563eb;">v = d / t = 240 / 4 = 60 km/h</p><p><strong>Speed.</strong> A runner moves at v = 5 m/s for t = 30 s. Find d.</p><p style="font-family:monospace;background:#f9fafb;padding:8px;border-left:3px solid #2563eb;">d = v &times; t = 5 &times; 30 = 150 m</p><p><strong>Speed.</strong> A plane covers d = 1500 km at v = 750 km/h. Find t.</p><p style="font-family:monospace;background:#f9fafb;padding:8px;border-left:3px solid #2563eb;">t = d / v = 1500 / 750 = 2 h</p><h3>Life Science Connections</h3><ul><li><strong>Heart-rate output.</strong> Cardiac output = stroke volume &times; heart rate. Solve for stroke volume given output and heart rate.</li><li><strong>Drug dosing.</strong> Total dose = (mg/kg) &times; body weight. Solve for body weight when you know the total dose and the per-kg rate.</li><li><strong>Population growth.</strong> Population = rate &times; time + start. Solve for time when a target population is given.</li><li><strong>Microscope.</strong> Observed size = magnification &times; actual size. Solve for actual size given the observed size and magnification.</li></ul><h3>The General Recipe</h3><ol><li>Find the variable you want.</li><li>If it is being multiplied, divide both sides by the other factor.</li><li>If it is being divided, multiply both sides by the divisor.</li><li>If it is on top of a fraction with the variable in the denominator, multiply both sides by that variable first &mdash; then divide.</li><li>Always check: substitute back and confirm both sides are equal.</li></ol>`,
  'scale-drawings': `<h2>Scale Drawings</h2><p>A <strong>scale</strong> is a ratio that relates distances on a drawing to actual distances.</p><h3>Understanding Scale</h3><p>Scale 1:100 means 1 unit on drawing = 100 units in real life</p><h3>Finding Missing Lengths</h3><p>Drawing 3 cm with scale 1:50</p><p>Actual = 3 × 50 = 150 cm</p><h3>Working Backward</h3><p>Actual distance 200 m, scale 1:10000</p><p>Drawing = 200 ÷ 10000 = 0.02 m = 2 cm</p><h3>Area and Scale</h3><p>If linear scale is 1:2, area scale is 1:4</p><p>If drawing area is 5 sq cm, actual is 5 × 4 = 20 sq cm</p><h3>Maps and Models</h3><p>Blueprint scales, map legends, model trains.</p>`,
  'triangles': `<h2>Geometric Shapes & Triangles</h2><p>Triangles have special properties and constraints.</p><h3>Triangle Inequality Theorem</h3><p>The sum of any two sides must be greater than the third side.</p><p>Can sides 3, 4, 8 form triangle? 3 + 4 = 7, not > 8. No!</p><h3>Angle Sum</h3><p>All angles in a triangle sum to 180°</p><h3>Triangle Types</h3><ul><li>Equilateral: all sides equal</li><li>Isosceles: two sides equal</li><li>Scalene: all sides different</li><li>Right: one 90° angle</li></ul><h3>Drawing Figures</h3><p>Use rulers and protractors to accurately construct geometric shapes.</p>`,
  'circles': `<h2>Circles</h2><p><strong>Circumference</strong> is the distance around. <strong>Area</strong> is space inside.</p><h3>Key Measurements</h3><ul><li>Radius (r): distance from center to edge</li><li>Diameter (d): distance across through center = 2r</li><li>π ≈ 3.14159</li></ul><h3>Circumference Formula</h3><p>C = πd or C = 2πr</p><p>Diameter 10 cm: C = 10π ≈ 31.4 cm</p><h3>Area Formula</h3><p>A = πr²</p><p>Radius 5 cm: A = π(5)² = 25π ≈ 78.5 sq cm</p><h3>Real-World Applications</h3><p>Track distances, pizza sizes, wheel rotations, pond dimensions.</p>`,
  'area-polygons': `<h2>Area of Polygons</h2><p>Find areas of complex shapes by breaking them into simpler parts.</p><h3>Basic Formulas</h3><ul><li>Rectangle: A = lw</li><li>Triangle: A = (1/2)bh</li><li>Parallelogram: A = bh</li><li>Trapezoid: A = ((b₁ + b₂)/2) × h</li></ul><h3>Composite Figures</h3><p>L-shape: split into two rectangles, find each area, add.</p><h3>Irregular Polygons</h3><p>Divide into triangles using diagonals, find each area.</p><h3>Applications</h3><p>Lawn treatment, floor plans, fabric needed, garden design.</p>`,
  'surface-area-volume': `<h2>Surface Area & Volume of 3D Figures</h2><h3>Rectangular Prisms</h3><p>SA = 2(lw + lh + wh)</p><p>V = lwh</p><h3>Triangular Prisms</h3><p>SA = (area of triangles) + (lateral rectangles)</p><p>V = (area of base) × height</p><h3>Pyramids</h3><p>SA = (base area) + (lateral triangle areas)</p><p>V = (1/3) × (base area) × height</p><h3>Real-World Uses</h3><p>Packaging materials, storage capacity, tent design, pool volume.</p>`,
  'surface-area-volume-ratio': `<h2>Surface Area : Volume Ratio &mdash; Why Cells Stay Small</h2><p>Why is every cell in your body microscopic, even though you are not? Why do small animals lose body heat faster than big animals? Why does a chopped onion brown faster than a whole one? All three answers come from the same rule of geometry: <strong>as size grows, surface area grows slower than volume</strong>.</p><h3>The Math</h3><p>Take a cube with side length s.</p><table style="border-collapse:collapse;width:100%;font-size:0.95em;margin:10px 0;"><tr style="background:#1F3864;color:#fff;"><th style="padding:7px 10px;">Dimension</th><th style="padding:7px 10px;">Formula</th><th style="padding:7px 10px;">How it scales</th></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">Surface Area (SA)</td><td style="padding:6px 10px;">6 s²</td><td style="padding:6px 10px;">grows with the SQUARE of size</td></tr><tr><td style="padding:6px 10px;">Volume (V)</td><td style="padding:6px 10px;">s³</td><td style="padding:6px 10px;">grows with the CUBE of size</td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">SA / V</td><td style="padding:6px 10px;">6 s² / s³ = 6 / s</td><td style="padding:6px 10px;">SHRINKS as size grows</td></tr></table><h3>Cube SA : V Table</h3><table style="border-collapse:collapse;width:100%;font-size:0.95em;margin:10px 0;"><tr style="background:#1F3864;color:#fff;"><th style="padding:7px 10px;">Side s</th><th style="padding:7px 10px;">SA = 6 s²</th><th style="padding:7px 10px;">V = s³</th><th style="padding:7px 10px;">SA : V (per unit)</th></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">1</td><td style="padding:6px 10px;">6</td><td style="padding:6px 10px;">1</td><td style="padding:6px 10px;"><strong>6 : 1</strong></td></tr><tr><td style="padding:6px 10px;">2</td><td style="padding:6px 10px;">24</td><td style="padding:6px 10px;">8</td><td style="padding:6px 10px;"><strong>3 : 1</strong></td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">3</td><td style="padding:6px 10px;">54</td><td style="padding:6px 10px;">27</td><td style="padding:6px 10px;"><strong>2 : 1</strong></td></tr><tr><td style="padding:6px 10px;">4</td><td style="padding:6px 10px;">96</td><td style="padding:6px 10px;">64</td><td style="padding:6px 10px;"><strong>1.5 : 1</strong></td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">6</td><td style="padding:6px 10px;">216</td><td style="padding:6px 10px;">216</td><td style="padding:6px 10px;"><strong>1 : 1</strong></td></tr><tr><td style="padding:6px 10px;">10</td><td style="padding:6px 10px;">600</td><td style="padding:6px 10px;">1000</td><td style="padding:6px 10px;"><strong>0.6 : 1</strong></td></tr></table><p>Each time the side doubles, SA quadruples but V multiplies by 8 &mdash; so SA / V is cut in half.</p><h3>Why Cells Are Tiny</h3><p>A cell takes in nutrients and oxygen through its surface (the membrane), and uses them in its volume (the cytoplasm). If volume grows much faster than surface, eventually a cell cannot import food fast enough. That is the upper size limit for a cell.</p><p>Most cells are 10 µm to 100 µm. Above that, they either divide (most cells), develop a folded surface (intestinal lining), or are stretched extremely thin (nerve cells).</p><p><em>Quick check.</em> A spherical cell with radius 5 µm has SA = 4&pi;r² ≈ 314 µm² and V = (4/3)&pi;r³ ≈ 524 µm³. SA/V ≈ 0.6 per µm. Doubling the radius to 10 drops SA/V to 0.3 per µm — half the import efficiency.</p><h3>Allometric Scaling &mdash; Animal Size and Heat Loss</h3><p>Animals lose heat through their skin (surface) and produce heat in their tissue (volume). Small animals have HIGH SA : V → they lose heat fast → they need to eat constantly. (A shrew eats every few hours or starves.) Big animals have LOW SA : V → they conserve heat well, but cannot dump excess heat easily — elephants need big ears, hippos stay in water.</p><h3>Speeding Things Up by Increasing Surface Area</h3><ul><li>Chopped onion browns faster than whole onion (more surface exposed to air).</li><li>Crushed ice melts faster than a single block (more surface in contact with warm air).</li><li>Lungs fold into 300 million alveoli to maximize surface for gas exchange.</li><li>Small intestine has finger-like villi to maximize surface for absorption.</li><li>Tree roots branch and re-branch to maximize surface for water uptake.</li></ul><h3>Calculating SA : V for Other Shapes</h3><p><strong>Cube (side s):</strong> SA = 6s², V = s³, SA/V = 6/s.</p><p><strong>Rectangular prism (l × w × h):</strong> SA = 2(lw + lh + wh), V = l×w×h.</p><p><strong>Sphere (radius r):</strong> SA = 4&pi;r², V = (4/3)&pi;r³, SA/V = 3/r.</p><p><strong>Cylinder (r, h):</strong> SA = 2&pi;rh + 2&pi;r², V = &pi;r²h, SA/V = 2/r + 2/h.</p><h3>Worked Example</h3><p>Compare a mouse (assume sphere, r = 3 cm) and an elephant (sphere, r = 100 cm).</p><p style="font-family:monospace;background:#f9fafb;padding:8px;border-left:3px solid #2563eb;">Mouse SA/V = 3 / 3 = 1.0 per cm<br>Elephant SA/V = 3 / 100 = 0.03 per cm</p><p>The mouse has roughly <strong>33 times</strong> more surface per unit volume than the elephant. That is why the mouse must eat its body weight in food every few days to stay warm.</p>`,
  'angles': `<h2>Angle Relationships</h2><h3>Angle Pairs</h3><ul><li><strong>Complementary:</strong> sum to 90°</li><li><strong>Supplementary:</strong> sum to 180°</li><li><strong>Vertical:</strong> opposite angles formed by intersecting lines (equal)</li><li><strong>Adjacent:</strong> share a side</li></ul><h3>Parallel Lines & Transversals</h3><p>When a line crosses parallel lines:</p><ul><li>Corresponding angles are equal</li><li>Alternate interior angles are equal</li><li>Co-interior angles sum to 180°</li></ul><h3>Finding Missing Angles</h3><p>If one angle is 65°, its supplement is 180° − 65° = 115°</p><h3>Applications</h3><p>Carpentry, construction, road design, navigation.</p>`,
  'probability': `<h2>Probability</h2><p><strong>Probability</strong> measures likelihood of an event: 0 to 1 (or 0% to 100%).</p><h3>Simple Probability</h3><p>P(event) = (favorable outcomes) ÷ (total outcomes)</p><p>Coin flip heads: 1 ÷ 2 = 0.5 or 50%</p><h3>Compound Events</h3><p>Rolling two dice, drawing cards with replacement.</p><p>P(both heads) = 0.5 × 0.5 = 0.25</p><h3>Theoretical vs. Experimental</h3><ul><li><strong>Theoretical:</strong> calculated mathematically</li><li><strong>Experimental:</strong> based on trials</li></ul><h3>Real-World Applications</h3><p>Games, weather forecasts, medical testing, insurance.</p>`,
  'statistics': `<h2>Statistics & Sampling</h2><p><strong>Random sampling</strong> helps draw fair conclusions about populations.</p><h3>Population vs. Sample</h3><p>Population: all items. Sample: subset for study.</p><h3>Random Samples</h3><p>Every item has equal chance of selection. Avoids bias.</p><h3>Comparing Distributions</h3><ul><li>Mean: average value</li><li>Median: middle value</li><li>Mode: most common</li><li>Range: spread of data</li></ul><h3>Inferences</h3><p>If sample mean is 75, we estimate population mean is near 75.</p><h3>Applications</h3><p>Surveys, market research, quality control, sports analytics.</p>`,
  'word-problems': `<h2>Multi-Step Word Problems</h2><p>Complex problems require multiple steps and mathematical modeling.</p><h3>Problem-Solving Steps</h3><ol><li>Read carefully, identify given and unknown</li><li>Plan approach (what operations needed?)</li><li>Solve step-by-step</li><li>Check answer makes sense</li></ol><h3>Problem Types</h3><ul><li><strong>Proportional:</strong> constant ratios</li><li><strong>Percent:</strong> increase, decrease, part of whole</li><li><strong>Geometry:</strong> area, volume, angles</li><li><strong>Probability:</strong> likelihood of outcomes</li><li><strong>Statistics:</strong> analyzing data</li></ul><h3>Example</h3><p>Movie ticket $12, 15% group discount, 8% tax. Final cost for 6 people?</p><ol><li>Full cost: 6 × $12 = $72</li><li>Discount: 15% of $72 = $10.80</li><li>After discount: $72 − $10.80 = $61.20</li><li>Tax: 8% of $61.20 = $4.90</li><li>Final: $61.20 + $4.90 = $66.10</li></ol>`,
  'population-growth': `<h2>Population Growth Models</h2><p>Biologists track how populations change over time. The simplest model assumes a population grows by the same <em>factor</em> each time period — for example, doubling every 20 years. This is called <strong>exponential growth</strong>, and it starts slowly but eventually produces enormous numbers.</p><h3>The Doubling Pattern</h3><p>If a population doubles every period, you multiply by 2 each time. Starting with 100 bacteria:</p><table style="border-collapse:collapse;width:100%;font-size:0.93em;margin:8px 0;"><tr style="background:#1F3864;color:#fff;"><th style="padding:6px 10px;">Period</th><th style="padding:6px 10px;">Population</th><th style="padding:6px 10px;">Pattern</th></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">0</td><td style="padding:6px 10px;">100</td><td style="padding:6px 10px;">100 × 2⁰ = 100</td></tr><tr><td style="padding:6px 10px;">1</td><td style="padding:6px 10px;">200</td><td style="padding:6px 10px;">100 × 2¹ = 200</td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">2</td><td style="padding:6px 10px;">400</td><td style="padding:6px 10px;">100 × 2² = 400</td></tr><tr><td style="padding:6px 10px;">3</td><td style="padding:6px 10px;">800</td><td style="padding:6px 10px;">100 × 2³ = 800</td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">n</td><td style="padding:6px 10px;">100 × 2ⁿ</td><td style="padding:6px 10px;">General rule</td></tr></table><h3>Doubling Time</h3><p>The <strong>doubling time</strong> is how long it takes a population to double. Real examples:</p><ul><li><em>E. coli</em> bacteria: doubles every 20 minutes in ideal conditions</li><li>Human world population: doubled from 3.5B to 7B in about 47 years (1967–2014)</li><li>Hawaiian monk seal: doubling slowly — recovering from near-extinction</li></ul><h3>Growth Rate vs. Doubling Time</h3><p>The Rule of 70 gives a quick estimate: <strong>Doubling time ≈ 70 ÷ growth rate (%)</strong></p><ul><li>Population growing at 2% per year: doubles in ~35 years</li><li>Bacteria growing at 3.5% per minute: doubles in ~20 minutes</li></ul><h3>Logistic Growth — When Resources Limit Growth</h3><p>Real populations can't grow forever — they hit a <strong>carrying capacity (K)</strong>, the maximum the environment can support. Growth slows as population approaches K. This creates an S-shaped curve instead of a J-shaped curve.</p><h3>Predator-Prey Oscillation</h3><p>When wolves (predators) increase, deer (prey) decrease. Fewer deer → less food for wolves → wolves decrease → deer recover. The two populations cycle up and down in sync, never perfectly stabilizing.</p>`,
  'genetics-probability': `<h2>Genetics & Probability</h2><p>Genes come in pairs. Each parent passes one copy to a child — chosen at random. The result? Inherited traits follow the exact same rules as probability. Gregor Mendel discovered this in 1866 by counting pea plants — he was really doing statistics on living things.</p><h3>Key Vocabulary</h3><ul><li><strong>Gene:</strong> segment of DNA coding for one trait</li><li><strong>Allele:</strong> a version of a gene (e.g., B = brown eyes, b = blue eyes)</li><li><strong>Dominant (capital letter):</strong> expressed even with one copy — B</li><li><strong>Recessive (lowercase):</strong> expressed only with two copies — bb</li><li><strong>Genotype:</strong> actual allele pair (BB, Bb, bb)</li><li><strong>Phenotype:</strong> visible trait (brown or blue eyes)</li></ul><h3>The Punnett Square</h3><p>A Punnett square is a 2×2 multiplication table that shows all possible offspring combinations. If both parents are <strong>Bb</strong> (brown eyes, carrying recessive blue):</p><table style="border-collapse:collapse;margin:8px auto;font-size:1em;"><tr><td style="padding:4px;"></td><td style="padding:8px;background:#1F3864;color:#fff;font-weight:bold;">B</td><td style="padding:8px;background:#1F3864;color:#fff;font-weight:bold;">b</td></tr><tr><td style="padding:8px;background:#1F3864;color:#fff;font-weight:bold;">B</td><td style="padding:8px;background:#E2EFDA;">BB</td><td style="padding:8px;background:#E2EFDA;">Bb</td></tr><tr><td style="padding:8px;background:#1F3864;color:#fff;font-weight:bold;">b</td><td style="padding:8px;background:#E2EFDA;">Bb</td><td style="padding:8px;background:#BDD7EE;">bb</td></tr></table><ul><li>P(BB) = 1/4 = 25% — brown eyes, doesn't carry recessive</li><li>P(Bb) = 2/4 = 50% — brown eyes, carries recessive</li><li>P(bb) = 1/4 = 25% — blue eyes</li><li>P(brown phenotype) = 3/4 = 75%</li><li>P(blue phenotype) = 1/4 = 25%</li></ul><h3>Predicted vs. Observed Ratios</h3><p>Mendel's famous 3:1 ratio (dominant:recessive) is a <em>probability prediction</em>, not a guarantee. With small samples, results vary. With thousands of plants, results get very close to 3:1 — just like flipping a coin 1,000 times gives close to 50% heads.</p><h3>Real-World Applications</h3><ul><li>Genetic counselors calculate probability of inheriting conditions like cystic fibrosis (recessive)</li><li>Blood type inheritance follows the same probability rules (with 3 alleles instead of 2)</li><li>DNA fingerprinting uses probability to identify suspects — "1 in 1 billion chance of random match"</li></ul>`,
  'pharmacokinetics': `<h2>Pharmacokinetics — Drug Half-Life</h2><p>Every medicine you take gets eliminated from your body at a predictable rate. The body eliminates a constant <em>fraction</em> of the drug per time period — usually one-half. This is called the drug's <strong>half-life</strong>, and it determines how often you need to take a dose and when the drug is safely out of your system.</p><h3>What Is Drug Half-Life?</h3><p>A drug's half-life is the time it takes for the concentration in your blood to fall to half its previous level. This is identical to radioactive decay — the same math, applied to medicine.</p><table style="border-collapse:collapse;width:100%;font-size:0.93em;margin:8px 0;"><tr style="background:#1F3864;color:#fff;"><th style="padding:6px 10px;">Time (half-lives)</th><th style="padding:6px 10px;">Fraction remaining</th><th style="padding:6px 10px;">Example: 500 mg dose</th></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">0</td><td style="padding:6px 10px;">1 = 100%</td><td style="padding:6px 10px;">500 mg</td></tr><tr><td style="padding:6px 10px;">1</td><td style="padding:6px 10px;">1/2 = 50%</td><td style="padding:6px 10px;">250 mg</td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">2</td><td style="padding:6px 10px;">1/4 = 25%</td><td style="padding:6px 10px;">125 mg</td></tr><tr><td style="padding:6px 10px;">3</td><td style="padding:6px 10px;">1/8 = 12.5%</td><td style="padding:6px 10px;">62.5 mg</td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">4</td><td style="padding:6px 10px;">1/16 = 6.25%</td><td style="padding:6px 10px;">31.25 mg</td></tr><tr><td style="padding:6px 10px;">5</td><td style="padding:6px 10px;">1/32 ≈ 3%</td><td style="padding:6px 10px;">15.6 mg</td></tr></table><h3>Real Drug Half-Lives</h3><ul><li><strong>Aspirin:</strong> ~3–5 hours (mostly gone in a day)</li><li><strong>Ibuprofen:</strong> ~2 hours (gone in 10–12 hours)</li><li><strong>Caffeine:</strong> ~5 hours (a cup of coffee is half gone in 5 hours)</li><li><strong>Diazepam (Valium):</strong> 20–100 hours (stays in system days to weeks)</li></ul><h3>Therapeutic Window</h3><p>Medicines must stay within a "therapeutic window" — high enough to work but low enough to avoid toxicity. Doctors use half-life to time repeat doses so the drug never drops too low between doses or builds up to dangerous levels with repeated dosing.</p><h3>Connection to Fractions</h3><p>After n half-lives: Amount remaining = Initial dose × (1/2)ⁿ. This is the same formula as radioactive decay. Both are examples of <strong>exponential decay</strong> — a pattern you'll study formally in Algebra 2, but which you can already model using fractions.</p>`,
  'biodiversity': `<h2>Ecology & Biodiversity Index</h2><p>Ecologists study ecosystems — communities of organisms living together. One key measure of ecosystem health is <strong>biodiversity</strong>: how many different species are present and how evenly they are distributed. A healthy forest has many different species in balanced numbers. A damaged ecosystem might have thousands of one invasive species and almost nothing else.</p><h3>Two Components of Biodiversity</h3><ul><li><strong>Species richness:</strong> how many different species are present (a count)</li><li><strong>Species evenness:</strong> how evenly individuals are distributed among species (a proportion)</li></ul><p>A pond with 5 species and 1,000 individuals of each is more diverse than a pond with 5 species where one species makes up 990 of 1,000 individuals.</p><h3>Proportion as a Biodiversity Tool</h3><p>For each species, calculate its <strong>proportion</strong> of the total: p = count of that species ÷ total individuals</p><p>Then compute: p × log₂(p) for each species and sum them. The result (called Shannon's H) is a diversity index. Higher H = more diverse.</p><p><strong>For 7th grade, we simplify:</strong> compute the proportions only and use them to compare ecosystems.</p><h3>Example — Two Forest Plots</h3><table style="border-collapse:collapse;width:100%;font-size:0.93em;margin:8px 0;"><tr style="background:#1F3864;color:#fff;"><th style="padding:6px 10px;">Species</th><th style="padding:6px 10px;">Forest A count</th><th style="padding:6px 10px;">Forest A %</th><th style="padding:6px 10px;">Forest B count</th><th style="padding:6px 10px;">Forest B %</th></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">Ōhiʻa</td><td style="padding:6px 10px;">200</td><td style="padding:6px 10px;">40%</td><td style="padding:6px 10px;">700</td><td style="padding:6px 10px;">70%</td></tr><tr><td style="padding:6px 10px;">Koa</td><td style="padding:6px 10px;">150</td><td style="padding:6px 10px;">30%</td><td style="padding:6px 10px;">150</td><td style="padding:6px 10px;">15%</td></tr><tr style="background:#f2f2f2;"><td style="padding:6px 10px;">Tree fern</td><td style="padding:6px 10px;">100</td><td style="padding:6px 10px;">20%</td><td style="padding:6px 10px;">80</td><td style="padding:6px 10px;">8%</td></tr><tr><td style="padding:6px 10px;">Other</td><td style="padding:6px 10px;">50</td><td style="padding:6px 10px;">10%</td><td style="padding:6px 10px;">70</td><td style="padding:6px 10px;">7%</td></tr></table><p>Forest A is more diverse — no single species dominates. Forest B is less diverse — Ōhiʻa dominates at 70%.</p><h3>Invasive Species & Biodiversity Loss</h3><p>In Hawaii, invasive species like strawberry guava and axis deer have dramatically reduced native biodiversity. One invasive species can shift a forest from 40% dominant to 90%+ dominant in a few decades — the proportion math makes this visible.</p>`
};

let completedUnits = {};
let currentUnit = null;

function resourceCardHTML(unit) {
  const ixlBtn = unit.ixlUrl ? `<a class="btn-ixl" href="${unit.ixlUrl}" target="_blank">📘 IXL Practice</a>` : '';
  const phetBtn = unit.phetUrl ? `<a class="btn-phet" href="${unit.phetUrl}" target="_blank">🧪 PhET Simulation</a>` : '';
  const ytBtn = `<a class="btn-yt" href="https://www.youtube.com/results?search_query=${encodeURIComponent(unit.ytSearch)}" target="_blank">▶️ YouTube</a>`;
  return `<div class="resource-card"><h3>📚 Resources</h3><div class="resource-btns">${ixlBtn}${phetBtn}${ytBtn}</div></div>`;
}

function renderHome() {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = '';
  UNITS.forEach(unit => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.onclick = () => showLesson(unit.id);
    card.innerHTML = `
      <div class="unit-card-header">
        <div class="unit-card-icon">${unit.icon}</div>
        <div class="unit-card-meta">
          <div class="unit-card-title">${unit.title}${completedUnits[unit.id]?' ✅':''}</div>
          <div class="unit-card-cc">${unit.cc}</div>
        </div>
      </div>
      <div class="unit-card-desc">${unit.desc}</div>
      <div class="unit-card-pills">
        ${unit.kaUrl?'<div class="pill">📖 Lesson</div>':''}
        ${unit.ixlUrl?'<div class="pill">📘 IXL</div>':''}
        <div class="pill">📋 Worksheet</div>
        <div class="pill">▶️ YouTube</div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar-content');
  sidebar.innerHTML = '';
  UNITS.forEach((unit, idx) => {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (currentUnit === unit.id ? ' active' : '');
    item.textContent = `${idx + 1}. ${unit.title}${completedUnits[unit.id]?' ✅':''}`;
    item.onclick = () => showLesson(unit.id);
    sidebar.appendChild(item);
  });
}

function setTopbar() {
  document.getElementById('topbar-title').textContent = currentUnit ? UNITS.find(u => u.id === currentUnit).title : 'Predicting the World with Math';
}

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home-screen').classList.add('active');
  currentUnit = null;
  renderHome();
  renderSidebar();
  setTopbar();
}

function showLesson(unitId) {
  currentUnit = unitId;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lesson-screen').classList.add('active');
  const unit = UNITS.find(u => u.id === unitId);
  document.getElementById('lesson-content').innerHTML = LESSONS[unitId] + resourceCardHTML(unit);
  const rwBtn = document.getElementById('realworld-btn');
  if (rwBtn) rwBtn.style.display = (REALWORLD_7 && REALWORLD_7[unitId]) ? '' : 'none';
  renderSidebar();
  setTopbar();
}

function showWorksheet() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('worksheet-screen').classList.add('active');
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><textarea id="ans-${idx}" placeholder="Your answer..."></textarea></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function checkWorksheet() {
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    const userAns = document.getElementById(`ans-${idx}`).value;
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><div class="answer-key"><strong>Answer:</strong> ${p.answer}</div><p><strong>Your answer:</strong> ${userAns || '(no answer)'}</p></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function showQuiz() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz-screen').classList.add('active');
  const quiz = QUIZZES[currentUnit];
  let html = `
    <div style="background:#f0f4ff;padding:14px;border-radius:8px;margin-bottom:15px;border-left:4px solid #1B3A8A;">
      <label style="display:block;font-weight:600;color:#1B3A8A;margin-bottom:6px;">Student Name:</label>
      <input type="text" id="student-name" placeholder="Type your full name"
        style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;" />
    </div>
  `;
  quiz.forEach((q, idx) => {
    html += `<div class="quiz-question"><h4>Question ${idx + 1}</h4><p>${q.q}</p>`;
    q.opts.forEach((opt, optIdx) => {
      html += `<label><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</label>`;
    });
    html += `</div>`;
  });
  document.getElementById('quiz-content').innerHTML = html;
}

// Quiz results stored at the latest submission so the email button can use them.
let lastQuizResults = null;

function submitQuiz() {
  const quiz = QUIZZES[currentUnit];
  const studentName = (document.getElementById('student-name')?.value || '').trim();
  let score = 0;
  const breakdown = [];
  quiz.forEach((q, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const selectedIdx = selected ? parseInt(selected.value) : -1;
    const isCorrect = selectedIdx === q.ans;
    if (isCorrect) score++;
    breakdown.push({
      n: idx + 1,
      question: q.q,
      studentAnswer: selectedIdx >= 0 ? q.opts[selectedIdx] : '(no answer)',
      correctAnswer: q.opts[q.ans],
      correct: isCorrect
    });
  });
  const percent = Math.round((score / quiz.length) * 100);
  completedUnits[currentUnit] = true;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('certificate-screen').classList.add('active');

  // Find unit title for display
  const unitObj = UNITS.find(u => u.id === currentUnit);
  const unitTitle = unitObj ? unitObj.title : currentUnit;

  lastQuizResults = { studentName, unitTitle, score, total: quiz.length, pct: percent, breakdown };

  const nameLine = studentName
    ? `<p><strong>Student:</strong> ${studentName}</p>`
    : `<p style="color:#b91c1c;"><em>Tip: type your name on the quiz screen before submitting so your teacher knows who you are.</em></p>`;

  document.getElementById('cert-content').innerHTML = `
    <div style="padding: 20px;">
      ${nameLine}
      <p><strong>Unit:</strong> ${unitTitle}</p>
      <p style="font-size: 24px; margin: 20px 0;">Quiz Score: ${score}/${quiz.length} (${percent}%)</p>
      <p>${percent === 100 ? "Perfect! 🌟" : percent >= 67 ? "Nice work! Keep practicing." : "Good try! Review the lesson and try again."}</p>
      <div style="margin-top:18px;">
        <button class="btn" onclick="emailResults()" style="background:#1B3A8A;color:white;padding:10px 18px;font-size:14px;border:none;border-radius:6px;cursor:pointer;">
          📧 Send Results to Mr. Raquepo
        </button>
      </div>
      <p style="margin-top:10px;font-size:12px;color:#666;">
        Tapping the button opens Gmail with the score and answers filled in. Just press Send.
      </p>
    </div>
  `;
  renderSidebar();
  updateProgress();
}

function emailResults() {
  if (!lastQuizResults) return;
  const r = lastQuizResults;
  const lines = [];
  lines.push(`Aloha Mr. Raquepo,`);
  lines.push(``);
  lines.push(`A 7th-grade math quiz was just submitted.`);
  lines.push(``);
  lines.push(`Student: ${r.studentName || '(name not provided)'}`);
  lines.push(`Unit: ${r.unitTitle}`);
  lines.push(`Score: ${r.score} out of ${r.total} (${r.pct}%)`);
  lines.push(``);
  lines.push(`--- Detailed Answers ---`);
  r.breakdown.forEach(b => {
    lines.push(``);
    lines.push(`Q${b.n}. ${b.question}`);
    lines.push(`   Student's answer: ${b.studentAnswer}`);
    lines.push(`   Correct answer:   ${b.correctAnswer}`);
    lines.push(`   ${b.correct ? '✓ Correct' : '✗ Incorrect'}`);
  });
  lines.push(``);
  lines.push(`Mahalo,`);
  lines.push(`Saint Theresa School — Grade 7 Math`);

  const subject = `Grade 7 Math Quiz Result — ${r.studentName || 'Student'} — ${r.unitTitle} — ${r.pct}%`;
  const body = lines.join('\n');
  const to = 'craquepo@rcchawaii.org';

  // Open Gmail's compose window directly (uses whichever Gmail account is logged in,
  // typically the student's @stshi.org account).
  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&tf=1`
    + `&to=${encodeURIComponent(to)}`
    + `&su=${encodeURIComponent(subject)}`
    + `&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl, '_blank');
}

function updateProgress() {
  const completed = Object.keys(completedUnits).length;
  document.getElementById('progress-text').textContent = `${completed}/${UNITS.length}`;
}
